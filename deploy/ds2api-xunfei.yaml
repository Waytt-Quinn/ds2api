apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds2api-xunfei
  labels:
    app: ds2api-xunfei
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ds2api-xunfei
  template:
    metadata:
      labels:
        app: ds2api-xunfei
    spec:
      containers:
        - name: ds2api-xunfei
          image: ghcr.io/waytt-quinn/ds2api:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/ds2api-xunfei"]
          ports:
            - name: http
              containerPort: 5002
              protocol: TCP
          env:
            - name: DS2API_XUNFEI_PORT
              value: "5002"
            - name: XUNFEI_API_HOST
              value: "ai-agent"
            - name: XUNFEI_API_PATH
              value: "/agent/skybox/api/v1/chat"
            - name: XUNFEI_API_KEY
              value: "your-app-id"
            - name: XUNFEI_API_SECRET
              value: "your-hmac-secret"
            - name: XUNFEI_DOMAIN
              value: "DeepSeek-V3"
            - name: XUNFEI_INSECURE_SKIP_VERIFY
              value: "true"
            - name: XUNFEI_COOKIE
              value: "your-cookie-value"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ds2api-xunfei
  labels:
    app: ds2api-xunfei
spec:
  type: ClusterIP
  selector:
    app: ds2api-xunfei
  ports:
    - name: http
      port: 5002
      targetPort: http
      protocol: TCP
